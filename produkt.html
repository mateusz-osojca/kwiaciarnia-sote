<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kwiaciarnia Sote</title>
  <meta name="description" content="Kwiaciarnia Sote – bukiety i kompozycje kwiatowe, Szczecin.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><img src="images/logo.jpg" alt="Kwiaciarnia Sote"></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Strona główna</a></li>
      <li><a href="o-nas.html">O nas</a></li>
      <li><a href="sklep.html" class="active">Sklep</a></li>
      <li style="display:none"><a href="warsztaty.html">Warsztaty</a></li>
    </ul>
    <button id="navCartBtn" class="nav-cart" onclick="openCartOnly()">&#128722; <span class="nav-cart-badge" id="navCartCount">0</span></button>
    <button class="nav-hamburger" onclick="toggleNav()" aria-label="Menu">&#9776;</button>
  </div>
</nav>

<div class="breadcrumb">
  <a href="sklep.html">Sklep</a>
  <span>›</span>
  <span id="breadcrumbName"></span>
</div>

<section class="product-detail" id="productDetailContainer">
  <div class="product-detail-inner">

    <div class="product-gallery">
      <img id="mainImg" class="product-gallery-main" src="" alt="">
      <div class="product-gallery-thumbs" id="galleryThumbs"></div>
    </div>

    <div class="product-info">
      <p class="product-info-category" id="productCategory"></p>
      <h1 class="product-info-name" id="productName"></h1>

      <p class="product-sizes-label">Wybierz rozmiar</p>
      <div class="product-sizes" id="productSizes"></div>

      <p class="product-current-price" id="currentPrice"></p>

      <p class="product-info-desc" id="productDescription"></p>

      <button id="cartBtn" class="btn btn-primary" onclick="addToCartAndOpen()">
        Dodaj do koszyka
      </button>
    </div>

  </div>
</section>

<footer>
  <div class="footer-inner">
    <div class="footer-logo">Kwiaciarnia&nbsp;<em>Sote</em></div>
    <p class="footer-tagline">Kwiaty z duszą &bull; Szczecin</p>
    <ul class="footer-links">
      <li><a href="index.html">Strona główna</a></li>
      <li><a href="o-nas.html">O nas</a></li>
      <li><a href="sklep.html">Sklep</a></li>
    </ul>
    <p class="footer-copy">&copy; 2025 Kwiaciarnia Sote. Wszelkie prawa zastrzeżone.</p>
    <p class="footer-copy"><a href="regulamin.html">Regulamin</a></p>
  </div>
</footer>

<script>
  function toggleNav() {
    document.getElementById('navLinks').classList.toggle('open');
  }
  document.querySelectorAll('.nav-links a').forEach(function(link) {
    link.addEventListener('click', function() {
      document.getElementById('navLinks').classList.remove('open');
    });
  });
  function switchImg(thumb) {
    document.getElementById('mainImg').src = thumb.src;
    document.querySelectorAll('.product-thumb').forEach(function(t) { t.classList.remove('active'); });
    thumb.classList.add('active');
  }
  function selectSize(btn) {
    document.querySelectorAll('.size-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    window.selectedSize  = btn.dataset.size;
    window.selectedPrice = parseInt(btn.dataset.price, 10);
    document.getElementById('currentPrice').textContent = window.selectedPrice + ' zł';
  }
</script>
<script src="products.js"></script>
<script>renderProductDetail();</script>
<script src="checkout.js"></script>

</body>
</html>
